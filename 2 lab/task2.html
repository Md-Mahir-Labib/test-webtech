<html>
<head>
    <link rel="stylesheet" type="text/css" href="./style.css" />
</head>

<body>
    <h1>Welcome to Pental Shop</h1>

    <table border="1">
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <form>
        <h1 class="HeaderSize">Contact Information</h1>

        <label>Name</label>
        <input type="text" />

        <label>Email</label>
        <input type="email" />

        <label>Message</label>
        <textarea rows="5" cols="40"></textarea>

        <input type="submit" value="Submit" class="button" />
    </form>
</body>
</html>
